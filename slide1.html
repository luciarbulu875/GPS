<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas Netas 2025 - Grupo GPS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(180deg, #050a14 0%, #0d1b2a 40%, #1b2838 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
    overflow-x: hidden;
}

@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
@keyframes pulse { 0%,100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }
@keyframes glow { 0%,100% { box-shadow: 0 0 20px rgba(0,86,210,0.3); } 50% { box-shadow: 0 0 40px rgba(0,86,210,0.6); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(30px) scale(0.9); } to { opacity: 1; transform: translateX(0) scale(1); } }

h1 {
    margin-top: 15px;
    font-size: 1.6rem;
    text-shadow: 0 2px 15px rgba(0,0,0,0.6);
    letter-spacing: 1px;
    background: linear-gradient(90deg, #38BDF8, #00C9A7, #38BDF8);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
}
.subtitle {
    font-size: 0.8rem;
    opacity: 0.7;
    margin-bottom: 10px;
    color: #94A3B8;
}

.main-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    gap: 25px;
    padding: 15px;
    width: 100%;
    max-width: 1400px;
}

/* TIERRA */
.earth-section {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.earth-container {
    position: relative;
    width: 450px;
    height: 450px;
    margin: 10px 0;
}
.earth-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 30px rgba(56, 189, 248, 0.2));
}

/* LOGO GPS */
.logo-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 150px;
    height: 150px;
    border-radius: 50%;
    overflow: hidden;
    z-index: 15;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    border: 3px solid rgba(255,255,255,0.3);
    background: white;
    animation: float 3s ease-in-out infinite, glow 2s ease-in-out infinite;
    transition: all 0.5s ease;
}
.logo-center img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.logo-center.full {
    border-color: #FFD700;
    box-shadow: 0 0 50px rgba(255,215,0,0.8);
    animation: pulse 1s ease-in-out infinite;
}

/* ETIQUETAS LATERALES - POSICIONADAS EXACTAMENTE EN EL COLOR */
.side-label-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 20;
}
.side-label {
    position: absolute;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transform: translateX(30px);
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: auto;
    cursor: pointer;
}
.side-label.visible {
    opacity: 1;
    transform: translateX(0);
}
.side-label:hover {
    transform: translateX(-5px) scale(1.02);
}
.side-label .label-line {
    width: 35px;
    height: 2px;
    background: currentColor;
    opacity: 0.6;
}
.side-label .label-card {
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid currentColor;
    border-radius: 12px;
    padding: 10px 16px;
    min-width: 220px;
    max-width: 280px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    color: white;
}
.side-label .label-city {
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    line-height: 1.2;
}
.side-label .label-amount {
    font-size: 0.85rem;
    opacity: 0.9;
    color: #94A3B8;
}
.side-label .label-percent {
    font-size: 1.2rem;
    font-weight: 800;
}
.side-label .label-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 10px currentColor;
}

/* PANEL INFO */
.info-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 320px;
    max-width: 400px;
}
.info-box {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 22px;
    border: 1px solid rgba(56, 189, 248, 0.15);
    transition: all 0.5s ease;
    animation: fadeIn 0.5s ease;
}
.info-box h3 {
    font-size: 0.9rem;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    line-height: 1.3;
}
.info-box .city-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.65rem;
    font-weight: 700;
    color: white;
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
}
.info-box .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}
.info-box .stat-row:last-child { border-bottom: none; }
.info-box .stat-label { opacity: 0.65; font-size: 0.85rem; }
.info-box .stat-value { font-weight: bold; font-size: 1rem; }
.info-box .highlight { color: #FFD700; }
.info-box .big-number { font-size: 1.3rem; font-weight: 800; }

.progress-bar-container {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
}
.progress-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    background: linear-gradient(90deg, #4FC3F7, #2196F3, #0056D2);
    box-shadow: 0 0 10px rgba(33, 150, 243, 0.5);
}

/* BOTONES */
.btn-row {
    display: flex;
    gap: 12px;
    margin-top: 8px;
}
.nav-btn {
    flex: 1;
    padding: 16px 24px;
    border: none;
    border-radius: 40px;
    color: white;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}
.prev-btn {
    background: linear-gradient(135deg, #FF7043 0%, #D84315 100%);
    box-shadow: 0 5px 20px rgba(255,112,67,0.4);
}
.prev-btn:hover:not(:disabled) {
    transform: scale(1.03);
    box-shadow: 0 7px 30px rgba(255,112,67,0.6);
}
.prev-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
}
.next-btn {
    background: linear-gradient(135deg, #2196F3 0%, #0D47A1 100%);
    box-shadow: 0 5px 20px rgba(33,150,243,0.4);
}
.next-btn:hover:not(:disabled) {
    transform: scale(1.03);
    box-shadow: 0 7px 30px rgba(33,150,243,0.6);
}
.next-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
}
.next-btn.complete {
    background: linear-gradient(135deg, #FFD700 0%, #FF8F00 100%);
    box-shadow: 0 5px 20px rgba(255,215,0,0.4);
    animation: pulse 1.5s ease-in-out infinite;
}

/* RANKING */
.ranking-panel {
    background: rgba(30, 41, 59, 0.6);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid rgba(56, 189, 248, 0.15);
    max-height: 500px;
    overflow-y: auto;
    min-width: 280px;
}
.ranking-panel h3 {
    font-size: 0.9rem;
    margin-bottom: 15px;
    color: #38BDF8;
    text-align: center;
}
.ranking-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 10px;
    margin-bottom: 6px;
    transition: all 0.3s;
    cursor: pointer;
    border: 1px solid transparent;
}
.ranking-item:hover {
    background: rgba(56, 189, 248, 0.1);
    border-color: rgba(56, 189, 248, 0.3);
    transform: translateX(4px);
}
.ranking-item.active {
    background: rgba(56, 189, 248, 0.15);
    border-color: #38BDF8;
}
.ranking-item .rank {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    background: rgba(56, 189, 248, 0.2);
    color: #38BDF8;
    flex-shrink: 0;
}
.ranking-item .rank.top3 {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #1E293B;
}
.ranking-item .info {
    flex: 1;
    min-width: 0;
}
.ranking-item .name {
    font-size: 0.8rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.ranking-item .division {
    font-size: 0.7rem;
    color: #64748B;
}
.ranking-item .bar-bg {
    width: 60px;
    height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
}
.ranking-item .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
}
.ranking-item .pct {
    font-size: 0.8rem;
    font-weight: 700;
    width: 45px;
    text-align: right;
    flex-shrink: 0;
}

/* MODAL EVOLUCION */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(5, 10, 20, 0.9);
    backdrop-filter: blur(8px);
    z-index: 2000;
    display: none;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
.modal-overlay.show {
    display: flex;
    animation: fadeIn 0.3s ease;
}
.modal-content {
    background: linear-gradient(135deg, rgba(30,41,59,0.95), rgba(15,23,42,0.98));
    border: 1px solid rgba(56, 189, 248, 0.3);
    border-radius: 24px;
    padding: 30px;
    max-width: 700px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 25px 80px rgba(0,0,0,0.6);
    animation: slideIn 0.4s ease;
}
.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}
.modal-title {
    font-size: 1.3rem;
    font-weight: 700;
}
.modal-subtitle {
    font-size: 0.85rem;
    color: #94A3B8;
    margin-top: 4px;
}
.modal-close {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(239, 68, 68, 0.3);
    background: rgba(239, 68, 68, 0.15);
    color: #EF4444;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
}
.modal-close:hover {
    background: rgba(239, 68, 68, 0.3);
    transform: scale(1.1);
}
.modal-chart-container {
    height: 300px;
    margin-top: 15px;
}
.modal-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 15px;
}
.modal-stat {
    background: rgba(15, 23, 42, 0.6);
    border-radius: 12px;
    padding: 15px;
    text-align: center;
}
.modal-stat .label {
    font-size: 0.7rem;
    color: #94A3B8;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.modal-stat .value {
    font-size: 1.1rem;
    font-weight: 800;
    margin-top: 6px;
}

/* Estrellas */
.stars {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: -1;
}
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite;
}
@keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.9; } }

@media (max-width: 1100px) {
    .main-container { flex-direction: column; align-items: center; }
    .earth-container { width: 350px; height: 350px; }
    .logo-center { width: 120px; height: 120px; }
    .ranking-panel { width: 100%; max-width: 400px; }
    .modal-stats { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
    .earth-container { width: 300px; height: 300px; }
    .logo-center { width: 100px; height: 100px; }
    h1 { font-size: 1.2rem; }
    .modal-stats { grid-template-columns: 1fr; }
}
</style>

let currentIndex = -1;
let currentPercent = 0;
const totalAmount = 887584264.95;
const SVG_SIZE = 450;
const EARTH_RADIUS = 200;
const EARTH_CENTER = 225;
const EARTH_TOP = EARTH_CENTER - EARTH_RADIUS;
const EARTH_BOTTOM = EARTH_CENTER + EARTH_RADIUS;
const FILLABLE_HEIGHT = EARTH_BOTTOM - EARTH_TOP;

let evolutionChart = null;

function createStars() {
    const container = document.getElementById('stars');
    for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.width = (Math.random() * 2.5 + 0.5) + 'px';
        star.style.height = star.style.width;
        container.appendChild(star);
    }
}

function formatMoney(amount) {
    return 'S/ ' + amount.toLocaleString('es-PE', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function pctToY(percent) {
    return EARTH_BOTTOM - (percent / 100) * FILLABLE_HEIGHT;
}

function updateButtons() {
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    prevBtn.disabled = currentIndex < 0;
    if (currentIndex >= cities.length - 1) {
        nextBtn.textContent = 'COMPLETADO';
        nextBtn.disabled = true;
        nextBtn.classList.add('complete');
        document.getElementById('logoCenter').classList.add('full');
    } else {
        nextBtn.innerHTML = 'SIGUIENTE <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>';
        nextBtn.disabled = false;
        nextBtn.classList.remove('complete');
        document.getElementById('logoCenter').classList.remove('full');
    }
}

function rebuildAllLayers() {
    const container = document.getElementById('waterLayers');
    container.innerHTML = '';
    let accum = 0;
    for (let i = 0; i <= currentIndex; i++) {
        const city = cities[i];
        const fromPct = accum;
        if (i === cities.length - 1 && currentIndex === cities.length - 1) {
            accum = 100.0;
        } else {
            accum += city.percent * 100;
        }
        const toPct = accum;
        const fromY = pctToY(fromPct);
        const toY = pctToY(toPct);
        const height = fromY - toY;

        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', '0');
        rect.setAttribute('y', toY);
        rect.setAttribute('width', '450');
        rect.setAttribute('height', height);
        rect.setAttribute('fill', city.color);
        rect.setAttribute('opacity', '0.55');
        rect.setAttribute('cursor', 'pointer');
        rect.setAttribute('data-index', i);
        rect.addEventListener('click', function() { showEvolution(i); });
        container.appendChild(rect);

        if (i < currentIndex) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', '0');
            line.setAttribute('x2', '450');
            line.setAttribute('y1', toY);
            line.setAttribute('y2', toY);
            line.setAttribute('stroke', 'rgba(255,255,255,0.5)');
            line.setAttribute('stroke-width', '1.5');
            line.setAttribute('stroke-dasharray', '6,4');
            container.appendChild(line);
        }
    }
    if (currentIndex >= 0) {
        const lastToY = pctToY(currentPercent);
        updateSurfaceWave(lastToY);
    } else {
        document.getElementById('surfaceWave').setAttribute('d', '');
    }
}

function nextCity() {
    currentIndex++;
    if (currentIndex >= cities.length) return;
    const city = cities[currentIndex];
    const oldPercent = currentPercent;
    if (currentIndex === cities.length - 1) {
        currentPercent = 100.0;
    } else {
        currentPercent += city.percent * 100;
    }
    rebuildAllLayers();
    updateInfoBox(city);
    document.getElementById('progressBar').style.width = currentPercent + '%';
    updateSideLabel(city, oldPercent, currentPercent);
    updateRanking();
    updateButtons();
}

function prevCity() {
    if (currentIndex < 0) return;
    currentIndex--;
    if (currentIndex < 0) {
        currentPercent = 0;
        resetToStart();
        return;
    }
    currentPercent = 0;
    for (let i = 0; i <= currentIndex; i++) {
        if (i === cities.length - 1 && currentIndex === cities.length - 1) {
            currentPercent = 100.0;
        } else {
            currentPercent += cities[i].percent * 100;
        }
    }
    const city = cities[currentIndex];
    rebuildAllLayers();
    updateInfoBox(city);
    document.getElementById('progressBar').style.width = currentPercent + '%';
    updateSideLabel(city, currentPercent - city.percent * 100, currentPercent);
    updateRanking();
    updateButtons();
}

function resetToStart() {
    document.getElementById('waterLayers').innerHTML = '';
    document.getElementById('sideLabelContainer').innerHTML = '';
    document.getElementById('surfaceWave').setAttribute('d', '');
    document.getElementById('cityBadge').textContent = 'ESPERANDO';
    document.getElementById('cityBadge').style.background = '#555';
    document.getElementById('cityName').textContent = 'Presiona SIGUIENTE';
    document.getElementById('amountDisplay').textContent = '—';
    document.getElementById('percentDisplay').textContent = '—';
    document.getElementById('accumDisplay').textContent = '0.00%';
    document.getElementById('remainDisplay').textContent = '100.00%';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('infoBox').style.borderColor = 'rgba(56,189,248,0.15)';
    document.getElementById('infoBox').style.boxShadow = 'none';
    updateRanking();
    updateButtons();
}

function updateSurfaceWave(y) {
    const wave = document.getElementById('surfaceWave');
    var d = 'M0,' + y + ' Q56.25,' + (y-5) + ' 112.5,' + y + ' T225,' + y + ' T337.5,' + y + ' T450,' + y;
    wave.setAttribute('d', d);
}

// ===== ETIQUETA LATERAL - POSICIONADA EXACTAMENTE EN EL CENTRO DEL COLOR =====
function updateSideLabel(city, fromPct, toPct) {
    const container = document.getElementById('sideLabelContainer');
    var fromY = pctToY(fromPct);
    var toY = pctToY(toPct);
    var centerY = (fromY + toY) / 2;
    var topPercent = (centerY / SVG_SIZE) * 100;

    container.innerHTML = '';
    var label = document.createElement('div');
    label.className = 'side-label';
    label.style.top = topPercent + '%';
    label.style.color = city.color;
    label.style.transform = 'translateY(-50%)';
    label.onclick = function() { showEvolution(currentIndex); };

    var amountStr = formatMoney(city.amount);
    var percentStr = (city.percent * 100).toFixed(2);

    label.innerHTML = 
        '<span class="label-dot" style="background:' + city.color + ';box-shadow:0 0 15px ' + city.color + '"></span>' +
        '<span class="label-line" style="background:' + city.color + '"></span>' +
        '<div class="label-card" style="border-color:' + city.color + '60">' +
        '<div class="label-city" style="color:' + city.color + '">' + city.name + '</div>' +
        '<div class="label-amount">' + amountStr + '</div>' +
        '<div class="label-percent" style="color:' + city.color + '">' + percentStr + '%</div>' +
        '</div>';

    container.appendChild(label);
    requestAnimationFrame(function() {
        label.classList.add('visible');
    });
}

function updateInfoBox(city) {
    var badge = document.getElementById('cityBadge');
    var name = document.getElementById('cityName');
    var amount = document.getElementById('amountDisplay');
    var percent = document.getElementById('percentDisplay');
    var accum = document.getElementById('accumDisplay');
    var remain = document.getElementById('remainDisplay');
    var box = document.getElementById('infoBox');

    badge.textContent = 'EMPRESA ' + (currentIndex + 1) + ' DE ' + cities.length;
    badge.style.background = city.color;
    name.textContent = city.name;
    amount.textContent = formatMoney(city.amount);
    percent.textContent = (city.percent * 100).toFixed(2) + '%';
    accum.textContent = currentPercent.toFixed(2) + '%';
    remain.textContent = Math.max(0, 100 - currentPercent).toFixed(2) + '%';

    box.style.borderColor = city.color + '60';
    box.style.boxShadow = '0 0 30px ' + city.color + '20';
}

function updateRanking() {
    var container = document.getElementById('rankingList');
    var maxPct = Math.max.apply(null, cities.map(function(c) { return c.percent * 100; }));
    var html = '';
    cities.forEach(function(city, i) {
        var isActive = i === currentIndex ? 'active' : '';
        var isTop3 = i < 3 ? 'top3' : '';
        var width = (city.percent * 100 / maxPct * 100).toFixed(1);
        var isVisited = i <= currentIndex ? '1' : '0.4';
        html += '<div class="ranking-item ' + isActive + '" onclick="goToCity(' + i + ')" style="opacity:' + isVisited + '">' +
            '<div class="rank ' + isTop3 + '">' + (i + 1) + '</div>' +
            '<div class="info"><div class="name">' + city.name.split(' - ')[0] + '</div><div class="division">' + city.name.split(' - ')[1] + '</div></div>' +
            '<div class="bar-bg"><div class="bar-fill" style="width:' + width + '%;background:' + city.color + '"></div></div>' +
            '<div class="pct" style="color:' + city.color + '">' + (city.percent * 100).toFixed(2) + '%</div>' +
            '</div>';
    });
    container.innerHTML = html;
}

function goToCity(index) {
    if (index === currentIndex) {
        showEvolution(index);
        return;
    }
    if (index < currentIndex) {
        while (currentIndex > index) { currentIndex--; }
    } else {
        while (currentIndex < index) { currentIndex++; }
    }
    currentPercent = 0;
    for (let i = 0; i <= currentIndex; i++) {
        if (i === cities.length - 1 && currentIndex === cities.length - 1) {
            currentPercent = 100.0;
        } else {
            currentPercent += cities[i].percent * 100;
        }
    }
    const city = cities[currentIndex];
    rebuildAllLayers();
    updateInfoBox(city);
    document.getElementById('progressBar').style.width = currentPercent + '%';
    updateSideLabel(city, currentPercent - city.percent * 100, currentPercent);
    updateRanking();
    updateButtons();
}

function showEvolution(index) {
    const city = cities[index];
    const overlay = document.getElementById('modalOverlay');
    const title = document.getElementById('modalTitle');
    const subtitle = document.getElementById('modalSubtitle');
    const stats = document.getElementById('modalStats');

    title.textContent = city.name.split(' - ')[0];
    title.style.color = city.color;
    subtitle.textContent = city.name.split(' - ')[1] + ' - Evolución 2020-2025';

    const years = ['2020', '2021', '2022', '2023', '2024', '2025'];
    const dataPoints = years.map(function(y) {
        return city.evolucion[y] || null;
    });

    const validData = dataPoints.filter(function(v) { return v !== null; });
    const minVal = validData.length > 0 ? Math.min.apply(null, validData) : 0;
    const maxVal = validData.length > 0 ? Math.max.apply(null, validData) : 0;
    const lastVal = validData.length > 0 ? validData[validData.length - 1] : 0;
    const firstVal = validData.length > 0 ? validData[0] : 0;
    const growth = firstVal > 0 ? ((lastVal - firstVal) / firstVal * 100) : 0;

    stats.innerHTML = 
        '<div class="modal-stat"><div class="label">Ventas 2025</div><div class="value" style="color:' + city.color + '">' + formatMoney(lastVal) + '</div></div>' +
        '<div class="modal-stat"><div class="label">Máximo Histórico</div><div class="value" style="color:#00C9A7">' + formatMoney(maxVal) + '</div></div>' +
        '<div class="modal-stat"><div class="label">Crecimiento Total</div><div class="value" style="color:' + (growth >= 0 ? '#00C9A7' : '#EF4444') + '">' + (growth > 0 ? '+' : '') + growth.toFixed(1) + '%</div></div>';

    overlay.classList.add('show');

    setTimeout(function() {
        renderEvolutionChart(city, years, dataPoints);
    }, 100);
}

function renderEvolutionChart(city, years, dataPoints) {
    const ctx = document.getElementById('evolutionChart').getContext('2d');

    if (evolutionChart) {
        evolutionChart.destroy();
        evolutionChart = null;
    }

    const gradient = ctx.createLinearGradient(0, 0, 0, 300);
    gradient.addColorStop(0, city.color + '40');
    gradient.addColorStop(1, city.color + '05');

    evolutionChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: years,
            datasets: [{
                label: 'Ventas Netas (S/)',
                data: dataPoints,
                borderColor: city.color,
                backgroundColor: gradient,
                fill: true,
                tension: 0.4,
                pointRadius: 8,
                pointHoverRadius: 12,
                pointBackgroundColor: city.color,
                pointBorderColor: '#fff',
                pointBorderWidth: 3,
                borderWidth: 3,
                spanGaps: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(15, 23, 42, 0.95)',
                    titleColor: '#38BDF8',
                    bodyColor: '#E2E8F0',
                    borderColor: city.color,
                    borderWidth: 2,
                    cornerRadius: 12,
                    padding: 15,
                    callbacks: {
                        label: function(context) {
                            const val = context.parsed.y;
                            if (val === null) return 'Sin datos';
                            return 'Ventas: ' + formatMoney(val);
                        }
                    }
                }
            },
            scales: {
                x: {
                    ticks: { color: '#94A3B8', font: { size: 13, weight: '600' } },
                    grid: { color: 'rgba(255,255,255,0.05)' }
                },
                y: {
                    ticks: {
                        color: '#94A3B8',
                        callback: function(v) {
                            if (v >= 1000000) return 'S/' + (v/1000000).toFixed(0) + 'M';
                            if (v >= 1000) return 'S/' + (v/1000).toFixed(0) + 'K';
                            return 'S/' + v;
                        }
                    },
                    grid: { color: 'rgba(255,255,255,0.05)' }
                }
            }
        }
    });
}

function closeModal(e) {
    if (e && e.target !== document.getElementById('modalOverlay')) return;
    document.getElementById('modalOverlay').classList.remove('show');
    if (evolutionChart) {
        evolutionChart.destroy();
        evolutionChart = null;
    }
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === ' ') nextCity();
    if (e.key === 'ArrowLeft') prevCity();
    if (e.key === 'Escape') closeModal();
});

createStars();
updateRanking();
updateButtons();
</script>
</body>
</html>
