<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas 2025 - Grupo GPS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(180deg, #050a14 0%, #0d1b2a 40%, #1b2838 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
    overflow-x: hidden;
}
h1 {
    margin-top: 10px;
    font-size: 1.4rem;
    text-shadow: 0 2px 15px rgba(0,0,0,0.6);
    letter-spacing: 1px;
}
.subtitle {
    font-size: 0.75rem;
    opacity: 0.6;
    margin-bottom: 5px;
}
.main-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    gap: 20px;
    padding: 8px;
    width: 100%;
    max-width: 1300px;
}
.earth-section {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.earth-container {
    position: relative;
    width: 420px;
    height: 420px;
    margin: 5px 0;
}
.earth-svg {
    width: 100%;
    height: 100%;
}
.logo-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 140px;
    height: 140px;
    border-radius: 50%;
    overflow: hidden;
    z-index: 15;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    border: 3px solid rgba(255,255,255,0.3);
    background: white;
    transition: all 0.5s ease;
}
.logo-center img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.logo-center.full {
    border-color: #FFD700;
    box-shadow: 0 0 40px rgba(255,215,0,0.6);
}
.side-label-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 20;
}
.side-label {
    position: absolute;
    right: -15px;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0;
    transform: translateX(20px);
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.side-label.visible {
    opacity: 1;
    transform: translateX(0);
}
.side-label .label-line {
    width: 25px;
    height: 2px;
    background: rgba(255,255,255,0.5);
}
.side-label .label-card {
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 8px 14px;
    min-width: 200px;
    max-width: 260px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.side-label .label-city {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
    line-height: 1.2;
}
.side-label .label-amount {
    font-size: 0.8rem;
    opacity: 0.9;
}
.side-label .label-percent {
    font-size: 1.1rem;
    font-weight: 800;
}
.side-label .label-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px rgba(255,255,255,0.3);
}
.info-panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 300px;
    max-width: 360px;
}
.info-box {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 14px;
    padding: 18px;
    border: 1px solid rgba(255,255,255,0.12);
    transition: all 0.5s ease;
}
.info-box h3 {
    font-size: 0.85rem;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    line-height: 1.3;
}
.info-box .city-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 15px;
    font-size: 0.6rem;
    font-weight: 700;
    color: white;
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
}
.info-box .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}
.info-box .stat-row:last-child { border-bottom: none; }
.info-box .stat-label { opacity: 0.65; font-size: 0.8rem; }
.info-box .stat-value { font-weight: bold; font-size: 0.95rem; }
.info-box .highlight { color: #FFD700; }
.info-box .big-number { font-size: 1.15rem; font-weight: 800; }
.progress-bar-container {
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 6px;
}
.progress-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    background: linear-gradient(90deg, #4FC3F7, #2196F3);
}
.btn-row {
    display: flex;
    gap: 10px;
    margin-top: 5px;
}
.nav-btn {
    flex: 1;
    padding: 14px 20px;
    border: none;
    border-radius: 40px;
    color: white;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}
.prev-btn {
    background: linear-gradient(135deg, #FF7043 0%, #D84315 100%);
    box-shadow: 0 5px 20px rgba(255,112,67,0.4);
}
.prev-btn:hover:not(:disabled) {
    transform: scale(1.03);
    box-shadow: 0 7px 30px rgba(255,112,67,0.6);
}
.prev-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
}
.next-btn {
    background: linear-gradient(135deg, #2196F3 0%, #0D47A1 100%);
    box-shadow: 0 5px 20px rgba(33,150,243,0.4);
}
.next-btn:hover:not(:disabled) {
    transform: scale(1.03);
    box-shadow: 0 7px 30px rgba(33,150,243,0.6);
}
.next-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
}
.next-btn.complete {
    background: linear-gradient(135deg, #FFD700 0%, #FF8F00 100%);
    box-shadow: 0 5px 20px rgba(255,215,0,0.4);
}
.stars {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: -1;
}
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite;
}
@keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.9; }
}
@media (max-width: 900px) {
    .earth-container { width: 340px; height: 340px; }
    .logo-center { width: 110px; height: 110px; }
    .info-panel { min-width: 260px; }
    h1 { font-size: 1rem; }
    .side-label { right: -5px; }
    .side-label .label-card { min-width: 150px; padding: 6px 10px; }
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<h1>Ventas Netas 2025 - Grupo GPS</h1>
<p class="subtitle">Navega con ANTERIOR / SIGUIENTE para ver cada empresa - Total: S/ 887,584,264.95</p>
<div class="main-container">
<div class="earth-section">
<div class="earth-container">
<div class="logo-center" id="logoCenter">
<img src="https://i.imgur.com/GPSlogo.png" alt="Logo GPS" onerror="this.style.display='none'">
</div>
<div class="side-label-container" id="sideLabelContainer"></div>
<svg class="earth-svg" viewBox="0 0 420 420">
<defs>
<clipPath id="earthClip">
<circle cx="210" cy="210" r="190"/>
</clipPath>
<filter id="glow">
<feGaussianBlur stdDeviation="4" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
</defs>

<g clip-path="url(#earthClip)">
<image href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/WorldMap-A_non-mobile.png/1200px-WorldMap-A_non-mobile.png" x="20" y="20" width="380" height="380" preserveAspectRatio="xMidYMid slice" opacity="0.9"/>
</g>

<circle cx="210" cy="210" r="190" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

<g clip-path="url(#earthClip)" id="waterLayers"></g>

<g clip-path="url(#earthClip)">
<path id="surfaceWave" d="" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
</g>

<ellipse cx="160" cy="140" rx="80" ry="60" fill="rgba(255,255,255,0.06)" clip-path="url(#earthClip)"/>
<circle cx="210" cy="210" r="190" fill="none" stroke="rgba(100,181,246,0.3)" stroke-width="1"/>
</svg>
</div>
</div>
<div class="info-panel">
<div class="info-box" id="infoBox">
<h3>
<span id="cityBadge" class="city-badge" style="background:#555">ESPERANDO</span>
<span id="cityName">Presiona SIGUIENTE</span>
</h3>
<div class="stat-row">
<span class="stat-label">Ventas Netas 2025:</span>
<span class="stat-value big-number" id="amountDisplay">—</span>
</div>
<div class="stat-row">
<span class="stat-label">Representa del Total:</span>
<span class="stat-value" id="percentDisplay">—</span>
</div>
<div class="stat-row">
<span class="stat-label">Acumulado:</span>
<span class="stat-value highlight" id="accumDisplay">0.00%</span>
</div>
<div class="stat-row">
<span class="stat-label">Restante:</span>
<span class="stat-value" id="remainDisplay">100.00%</span>
</div>
<div class="progress-bar-container">
<div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
</div>
</div>
<div class="btn-row">
<button class="nav-btn prev-btn" id="prevBtn" onclick="prevCity()" disabled>ANTERIOR</button>
<button class="nav-btn next-btn" id="nextBtn" onclick="nextCity()">SIGUIENTE</button>
</div>
</div>
</div>

<script>
const cities = [{"name": "DEPSA - DEPSA ABARROTES", "amount": 268721237.1, "percent": 0.30275574693196916, "color": "#1E88E5"}, {"name": "ALSE - ALSE ABARROTES", "amount": 246360482.0, "percent": 0.27756292188649623, "color": "#7B1FA2"}, {"name": "ECONOMYSA - ECONOMYSA ABARROTES", "amount": 86225814.39999999, "percent": 0.09714662348690614, "color": "#F57C00"}, {"name": "MISA - MISA BEBIDAS", "amount": 77350486.0, "percent": 0.08714720286795234, "color": "#388E3C"}, {"name": "ALSE - ALSE BEBIDAS", "amount": 46243050.0, "percent": 0.052099898371457724, "color": "#00897B"}, {"name": "PETRORED - PETRORED GRIFOS", "amount": 34430095.0, "percent": 0.038790790192680516, "color": "#5E35B1"}, {"name": "DEPSA - DEPSA ACEITE", "amount": 26439296.0, "percent": 0.029787927799158762, "color": "#C62828"}, {"name": "DESEL - DESEL ABARROTES", "amount": 26153040.0, "percent": 0.029465416448626738, "color": "#00695C"}, {"name": "CIIA - CIIA INMOBILIARIA", "amount": 17243167.410000004, "percent": 0.0194270764939387, "color": "#F9A825"}, {"name": "CHASQUICARGO - CHASQUI TRANSPORTE", "amount": 12725489.0, "percent": 0.014337217887382063, "color": "#E53935"}, {"name": "PANES - PANES HARINAS", "amount": 10416025.0, "percent": 0.011735251976990334, "color": "#43A047"}, {"name": "INKA MIKUNA - IKM FC", "amount": 10229652.0, "percent": 0.011525274167153318, "color": "#FB8C00"}, {"name": "MISA - MISA LICORES", "amount": 6093809.26, "percent": 0.006865612089623154, "color": "#3949AB"}, {"name": "ROMA - ROMA PANETON", "amount": 4160685.0, "percent": 0.004687650698983924, "color": "#8E24AA"}, {"name": "INKA MIKUNA - IKM MERMELADA", "amount": 2820707.0, "percent": 0.003177959672548835, "color": "#D81B60"}, {"name": "PO-PLAST - PO PLAST PREFORMAS", "amount": 2739701.0, "percent": 0.003086693971703447, "color": "#00ACC1"}, {"name": "AGROSAN - AGROSAN PALMITOS", "amount": 2325839.0, "percent": 0.0026204148629550357, "color": "#7CB342"}, {"name": "PERU-PAST - PERU PAST FIDEOS", "amount": 2209902.0, "percent": 0.0024897940254996406, "color": "#FFB300"}, {"name": "IIS - IIS INMOBILIARIA", "amount": 1080000.0, "percent": 0.0012167858789845034, "color": "#5E35B1"}, {"name": "DEPSA - DEPSA INMOBILIARIA", "amount": 868212.51, "percent": 0.000978174742708974, "color": "#E64A19"}, {"name": "ROMA - ROMA PANIFICACIÓN", "amount": 815980.0, "percent": 0.0009193267977164584, "color": "#039BE5"}, {"name": "MISA - MISA INMOBILIARIA", "amount": 756181.0, "percent": 0.0008519540395892414, "color": "#546E7A"}, {"name": "DEPSA - DEPSA OPERADOR LOGISTICO", "amount": 559847.42, "percent": 0.0006307541065202838, "color": "#8D6E63"}, {"name": "INKATEL - INKATEL OTROS", "amount": 542076.09, "percent": 0.0006107319737473451, "color": "#78909C"}, {"name": "DEPSA - DEPSA LIQUIMOLLY", "amount": 55490.76, "percent": 0.00006251886405751678, "color": "#26A69A"}, {"name": "ALSE - ALSE INMOBILIARIA", "amount": 18000.0, "percent": 0.00002027976464974172, "color": "#EF5350"}];

let currentIndex = -1;
let currentPercent = 0;
const totalAmount = 887584264.95;
const SVG_SIZE = 420;
const EARTH_RADIUS = 190;
const EARTH_CENTER = 210;
const EARTH_TOP = EARTH_CENTER - EARTH_RADIUS;
const EARTH_BOTTOM = EARTH_CENTER + EARTH_RADIUS;
const FILLABLE_HEIGHT = EARTH_BOTTOM - EARTH_TOP;

function createStars() {
    const container = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.width = (Math.random() * 2.5 + 0.5) + 'px';
        star.style.height = star.style.width;
        container.appendChild(star);
    }
}

function animateNumber(from, to, duration, elementId, suffix) {
    suffix = suffix || '';
    const start = performance.now();
    const display = document.getElementById(elementId);
    function update(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = from + (to - from) * eased;
        display.textContent = current.toFixed(2) + suffix;
        if (progress < 1) requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
}

function pctToY(percent) {
    return EARTH_BOTTOM - (percent / 100) * FILLABLE_HEIGHT;
}

function updateButtons() {
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    prevBtn.disabled = currentIndex < 0;
    if (currentIndex >= cities.length - 1) {
        nextBtn.textContent = 'COMPLETADO';
        nextBtn.disabled = true;
        nextBtn.classList.add('complete');
        document.getElementById('logoCenter').classList.add('full');
    } else {
        nextBtn.textContent = 'SIGUIENTE';
        nextBtn.disabled = false;
        nextBtn.classList.remove('complete');
        document.getElementById('logoCenter').classList.remove('full');
    }
}

function rebuildAllLayers() {
    const container = document.getElementById('waterLayers');
    container.innerHTML = '';
    let accum = 0;
    for (let i = 0; i <= currentIndex; i++) {
        const city = cities[i];
        const fromPct = accum;
        if (i === cities.length - 1 && currentIndex === cities.length - 1) {
            accum = 100.0;
        } else {
            accum += city.percent * 100;
        }
        const toPct = accum;
        const fromY = pctToY(fromPct);
        const toY = pctToY(toPct);
        const height = fromY - toY;
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', '0');
        rect.setAttribute('y', toY);
        rect.setAttribute('width', '420');
        rect.setAttribute('height', height);
        rect.setAttribute('fill', city.color);
        rect.setAttribute('opacity', '0.85');
        container.appendChild(rect);
        if (i < currentIndex) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', '0');
            line.setAttribute('x2', '420');
            line.setAttribute('y1', toY);
            line.setAttribute('y2', toY);
            line.setAttribute('stroke', 'rgba(255,255,255,0.5)');
            line.setAttribute('stroke-width', '1.5');
            line.setAttribute('stroke-dasharray', '6,4');
            container.appendChild(line);
        }
    }
    if (currentIndex >= 0) {
        const lastToY = pctToY(currentPercent);
        updateSurfaceWave(lastToY);
    } else {
        document.getElementById('surfaceWave').setAttribute('d', '');
    }
}

function nextCity() {
    currentIndex++;
    if (currentIndex >= cities.length) return;
    const city = cities[currentIndex];
    const oldPercent = currentPercent;
    if (currentIndex === cities.length - 1) {
        currentPercent = 100.0;
    } else {
        currentPercent += city.percent * 100;
    }
    rebuildAllLayers();
    updateInfoBox(city);
    document.getElementById('progressBar').style.width = currentPercent + '%';
    updateSideLabel(city, oldPercent, currentPercent);
    updateButtons();
}

function prevCity() {
    if (currentIndex < 0) return;
    currentIndex--;
    if (currentIndex < 0) {
        currentPercent = 0;
        resetToStart();
        return;
    }
    currentPercent = 0;
    for (let i = 0; i <= currentIndex; i++) {
        if (i === cities.length - 1 && currentIndex === cities.length - 1) {
            currentPercent = 100.0;
        } else {
            currentPercent += cities[i].percent * 100;
        }
    }
    const city = cities[currentIndex];
    rebuildAllLayers();
    updateInfoBox(city);
    document.getElementById('progressBar').style.width = currentPercent + '%';
    updateSideLabel(city, currentPercent - city.percent * 100, currentPercent);
    updateButtons();
}

function resetToStart() {
    document.getElementById('waterLayers').innerHTML = '';
    document.getElementById('sideLabelContainer').innerHTML = '';
    document.getElementById('surfaceWave').setAttribute('d', '');
    document.getElementById('cityBadge').textContent = 'ESPERANDO';
    document.getElementById('cityBadge').style.background = '#555';
    document.getElementById('cityName').textContent = 'Presiona SIGUIENTE';
    document.getElementById('amountDisplay').textContent = '\u2014';
    document.getElementById('percentDisplay').textContent = '\u2014';
    document.getElementById('accumDisplay').textContent = '0.00%';
    document.getElementById('remainDisplay').textContent = '100.00%';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('infoBox').style.borderColor = 'rgba(255,255,255,0.12)';
    document.getElementById('infoBox').style.boxShadow = 'none';
    updateButtons();
}

function updateSurfaceWave(y) {
    const wave = document.getElementById('surfaceWave');
    var d = 'M0,' + y + ' Q52.5,' + (y-4) + ' 105,' + y + ' T210,' + y + ' T315,' + y + ' T420,' + y;
    wave.setAttribute('d', d);
}

function updateSideLabel(city, fromPct, toPct) {
    const container = document.getElementById('sideLabelContainer');
    var fromY = pctToY(fromPct);
    var toY = pctToY(toPct);
    var centerY = (fromY + toY) / 2;
    var topPercent = (centerY / SVG_SIZE) * 100;
    container.innerHTML = '';
    var label = document.createElement('div');
    label.className = 'side-label';
    label.style.top = topPercent + '%';
    var amountStr = city.amount.toLocaleString('es-PE', {minimumFractionDigits:2, maximumFractionDigits:2});
    var percentStr = (city.percent * 100).toFixed(2);
    label.innerHTML = '<span class="label-dot" style="background:' + city.color + ';box-shadow:0 0 10px ' + city.color + '80"></span>' +
        '<span class="label-line" style="background:' + city.color + '80"></span>' +
        '<div class="label-card" style="border-color:' + city.color + '60">' +
        '<div class="label-city" style="color:' + city.color + '">' + city.name + '</div>' +
        '<div class="label-amount">S/ ' + amountStr + '</div>' +
        '<div class="label-percent" style="color:' + city.color + '">' + percentStr + '%</div>' +
        '</div>';
    container.appendChild(label);
    requestAnimationFrame(function() {
        label.classList.add('visible');
    });
}

function updateInfoBox(city) {
    var badge = document.getElementById('cityBadge');
    var name = document.getElementById('cityName');
    var amount = document.getElementById('amountDisplay');
    var percent = document.getElementById('percentDisplay');
    var accum = document.getElementById('accumDisplay');
    var remain = document.getElementById('remainDisplay');
    var box = document.getElementById('infoBox');
    badge.textContent = 'EMPRESA ' + (currentIndex + 1) + ' DE ' + cities.length;
    badge.style.background = city.color;
    name.textContent = city.name;
    amount.textContent = 'S/ ' + city.amount.toLocaleString('es-PE', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    percent.textContent = (city.percent * 100).toFixed(2) + '%';
    var oldAccum = parseFloat(accum.textContent);
    var oldRemain = parseFloat(remain.textContent);
    animateNumber(oldAccum, currentPercent, 1000, 'accumDisplay', '%');
    animateNumber(oldRemain, Math.max(0, 100 - currentPercent), 1000, 'remainDisplay', '%');
    box.style.borderColor = city.color + '60';
    box.style.boxShadow = '0 0 30px ' + city.color + '20';
}

createStars();
updateButtons();
</script>
</body>
</html>
